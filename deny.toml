[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
version = 2
# Unmaintained-but-no-vulnerability advisories — pinned with the
# rationale here so a future bump can revisit. Active CVEs are NOT
# allowed here; they fail CI by design.
ignore = [
    # RUSTSEC-2025-0141 — bincode 1.x: development ceased, no CVE.
    # Pulled in transitively via `cranelift-codegen`; we do not own
    # the upgrade path. Drop when cranelift moves to bincode 2.x.
    "RUSTSEC-2025-0141",
    # RUSTSEC-2025-0134 — rustls-pemfile 2.x: archived, no CVE. The
    # functionality is folded into `rustls-pki-types`. Pulled in by
    # `reqwest`; drop when reqwest migrates.
    "RUSTSEC-2025-0134",
    # RUSTSEC-2023-0071 — `rsa` 0.9.x Marvin Attack timing side
    # channel during PKCS#1 v1.5 *decryption*. *No fixed upgrade
    # is available* in the rsa crate as of audit time. We use the
    # crate only for PKCS#1 v1.5 signing / verification through
    # `gossamer-std::crypto::rsa`; the vulnerable decryption path
    # is not reachable. Re-audit when the crate ships a
    # constant-time decryption fix.
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.92

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Allow `libc` to appear from several transitive graph depths.
skip-tree = [
    { name = "libc" },
    { name = "windows-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
