[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
version = 2
# Unmaintained-but-no-vulnerability advisories — pinned with the
# rationale here so a future bump can revisit. Active CVEs are NOT
# allowed here; they fail CI by design.
ignore = [
    # RUSTSEC-2025-0141 — bincode 1.x: development ceased, no CVE.
    # Pulled in transitively via `cranelift-codegen`; we do not own
    # the upgrade path. Drop when cranelift moves to bincode 2.x.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.92

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Allow `libc` to appear from several transitive graph depths.
skip-tree = [
    { name = "libc" },
    { name = "windows-sys" },
]
# Transitive duplicates pulled in by `cranelift 0.123`. We do not
# own the upgrade path; drop these once cranelift consolidates.
skip = [
    # `bitflags 1.3.2` reaches the workspace via `region 3.0.2 →
    # cranelift-jit`; the directly-named version is 2.x.
    { name = "bitflags", version = "1.3.2" },
    # `hashbrown 0.15.5` reaches the workspace via `cranelift-codegen`;
    # `hashbrown 0.17.0` arrives transitively via `indexmap 2.14 →
    # gimli 0.32 → cranelift-codegen`. Both land through cranelift.
    { name = "hashbrown", version = "0.15.5" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
