# cargo-audit configuration. Mirrored in `deny.toml`. Each ignore
# below documents the rationale; active CVEs may only be listed
# here when there is no fixed upstream version AND the vulnerable
# code path is not reachable from this workspace.

[advisories]
ignore = [
    # bincode 1.x — development ceased; no CVE. Pulled in transitively
    # via cranelift-codegen; drop when cranelift moves to bincode 2.x.
    "RUSTSEC-2025-0141",
    # rustls-pemfile 2.x — archived; functionality folded into
    # rustls-pki-types. Drop when our transitive consumers migrate.
    "RUSTSEC-2025-0134",
    # rsa 0.9.x Marvin Attack timing side channel during PKCS#1 v1.5
    # *decryption*. No fixed upgrade is available. We use the crate
    # only for PKCS#1 v1.5 signing / verification through
    # `gossamer-std::crypto::rsa`; the vulnerable decryption path is
    # not reachable. Re-audit when a constant-time decryption fix
    # ships upstream.
    "RUSTSEC-2023-0071",
]
