name: Publish docs

on:
  push:
    branches: [main]
    paths:
      - 'docs_src/**'
      - 'landing/**'
      - 'mkdocs.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install mkdocs
        run: pip install mkdocs
      - name: Assemble landing page at site root
        run: |
          mkdir -p site
          cp -r landing/. site/
      - name: Build mkdocs into site/docs/
        run: mkdocs build --strict --site-dir site/docs
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v5
